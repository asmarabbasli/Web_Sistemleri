<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8"/>
  <title>CSS Tapşırığı</title>
  <style>
    .class1 {
      color: white;
      font-size: 30px;
      background-color: teal;
      text-align: center;
      border: 1px solid black;
    }

    #id1 {
      color: white;
      font-size: 26px;
      background-color: rgb(146, 61, 61);
      text-align: start;
      border: 1px solid purple;
    }
  </style>
</head>
<body>

  <h1 id="id1">Bu h1 teqidir — brown fon</h1>

  <p id="id1">Bu p teqidir — brown fon</p>

  <h2 class="class1">Bu h2 teqidir — teal fon</h2>

  <span class="class1">Bu span teqidir — teal fon</span>

</body>
</html>
