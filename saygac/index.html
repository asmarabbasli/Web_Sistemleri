<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Sayğacı</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="counter-container">
        <h1>Sayğac Tətbiqi</h1>
        
        <div class="counter-display">
            <span id="counter-value">0</span>
        </div>
        
        <div class="button-container">
            <button id="decrease-btn" class="btn btn-danger">Azalt</button>
            <button id="reset-btn" class="btn btn-warning">Sıfırla</button>
            <button id="increase-btn" class="btn btn-success">Artır</button>
        </div>
        
        <div class="history-section">
            <h3>Əməliyyat Tarixçəsi</h3>
            <ul id="history-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
