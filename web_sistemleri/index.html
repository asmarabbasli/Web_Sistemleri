<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Eded Yoxlama</title>
</head>
<body>

<script>
let eded = Number(prompt("Bir ədəd daxil edin:"));

if (eded < 0) {
    alert("Bu eded menfidir");
} 
else if (eded >= 1 && eded <= 10) {
    alert("Bu eded 1 ve 10 arasinda yerlesir");
} 
else if (eded > 10 && eded < 100) {
    alert("Bu eded 10 ve 100 arasinda yerlesir");
} 
else if (eded >= 100) {
    alert("Bu eded 100 den boyukdur");
}
</script>

</body>
</html>
