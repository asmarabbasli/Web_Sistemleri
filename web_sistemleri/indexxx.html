<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ədəd müqayisəsi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 1.75rem; width: 100%; max-width: 420px; }
    h2 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; }
    .field input { width: 100%; font-size: 16px; padding: 10px 12px; border-radius: 8px; border: 1px solid #ccc; outline: none; transition: border-color 0.15s; }
    .field input:focus { border-color: #888; }
    .note { font-size: 12px; color: #aaa; margin-bottom: 1.25rem; }
    .note span { background: #e8f0fe; color: #1a5dab; border-radius: 4px; padding: 1px 6px; font-weight: 500; }
    .btn { width: 100%; padding: 11px; font-size: 15px; font-weight: 500; border-radius: 8px; border: 1px solid #ccc; background: #fff; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .btn:hover { background: #f5f5f5; }
    .btn:active { transform: scale(0.98); }
    .result-box { margin-top: 1rem; border-radius: 8px; padding: 1rem 1.25rem; display: none; align-items: center; gap: 12px; }
    .result-box.show { display: flex; }
    .result-icon { font-size: 22px; flex-shrink: 0; }
    .result-text { font-size: 15px; font-weight: 500; }
    .result-sub { font-size: 12px; margin-top: 2px; color: #666; }
    .vis { margin-top: 1.25rem; display: none; }
    .vis.show { display: block; }
    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .bar-label { font-size: 12px; color: #888; width: 36px; text-align: right; flex-shrink: 0; }
    .bar-track { flex: 1; height: 8px; background: #f0f0f0; border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
    .bar-val { font-size: 12px; color: #888; width: 40px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Ədəd müqayisəsi</h2>
    <div class="row">
      <div class="field">
        <label>A dəyəri</label>
        <input type="number" id="a" placeholder="0" oninput="reset()">
      </div>
      <div class="field">
        <label>B dəyəri</label>
        <input type="number" id="b" placeholder="0" oninput="reset()">
      </div>
    </div>
    <p class="note">A-ya avtomatik olaraq <span>+20</span> əlavə edilir</p>
    <button class="btn" onclick="yoxla()">Müqayisə et</button>
    <div class="result-box" id="result-box">
      <div class="result-icon" id="r-icon"></div>
      <div>
        <div class="result-text" id="r-text"></div>
        <div class="result-sub" id="r-sub"></div>
      </div>
    </div>
    <div class="vis" id="vis">
      <div class="bar-row">
        <div class="bar-label">A</div>
        <div class="bar-track"><div class="bar-fill" id="bar-a" style="background:#4a90d9"></div></div>
        <div class="bar-val" id="bv-a"></div>
      </div>
      <div class="bar-row">
        <div class="bar-label">B</div>
        <div class="bar-track"><div class="bar-fill" id="bar-b" style="background:#e6a817"></div></div>
        <div class="bar-val" id="bv-b"></div>
      </div>
    </div>
  </div>

  <script>
    function reset() {
      document.getElementById('result-box').classList.remove('show');
      document.getElementById('vis').classList.remove('show');
    }

    function yoxla() {
      const rawA = Number(document.getElementById('a').value);
      const rawB = Number(document.getElementById('b').value);
      if (document.getElementById('a').value === '' || document.getElementById('b').value === '') return;

      const a = rawA + 20;
      const b = rawB;

      const box = document.getElementById('result-box');
      box.classList.add('show');

      const icon = document.getElementById('r-icon');
      const text = document.getElementById('r-text');
      const sub  = document.getElementById('r-sub');

      if (a < b) {
        box.style.background = '#e8f0fe';
        icon.textContent = '<';
        text.style.color = '#1a5dab';
        text.textContent = 'A, B-dən kiçikdir';
        sub.textContent = `${rawA} + 20 = ${a}  <  ${b}`;
      } else if (a === b) {
        box.style.background = '#e6f4ea';
        icon.textContent = '=';
        text.style.color = '#2a7a3b';
        text.textContent = 'A, B-yə bərabərdir';
        sub.textContent = `${rawA} + 20 = ${a}  =  ${b}`;
      } else {
        box.style.background = '#fef9e7';
        icon.textContent = '>';
        text.style.color = '#a06000';
        text.textContent = 'A, B-dən böyükdür';
        sub.textContent = `${rawA} + 20 = ${a}  >  ${b}`;
      }

      const vis = document.getElementById('vis');
      vis.classList.add('show');
      const max = Math.max(Math.abs(a), Math.abs(b), 1);
      document.getElementById('bar-a').style.width = Math.round(Math.abs(a) / max * 100) + '%';
      document.getElementById('bar-b').style.width = Math.round(Math.abs(b) / max * 100) + '%';
      document.getElementById('bv-a').textContent = a;
      document.getElementById('bv-b').textContent = b;
    }
  </script>
</body>
</html>
